name: kawasaki-slot-checker

on:
  repository_dispatch:
    types: [check]
  workflow_dispatch: 
    inputs:
      slot_category:
        description: 'Slot category to check — comma-separated for multiple (e.g. 普通車ＡＭ,普通車ＰＭ)'
        required: false
        default: '普通車ＡＭ,普通車ＰＭ'
      alert_before:
        description: 'Only alert for slots before this date (YYYYMMDD)'
        required: false

jobs:
  check:
    runs-on: ubuntu-latest
    
    # 核心改动：直接借用官方镜像，内部已经预装好所有运行环境
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble 

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # needed to push state commit back

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'   # D-17
          cache: 'npm'         # caches node_modules across runs

      - name: Install dependencies
        run: npm ci            # D-16

      # =============================================================
      #  原本的 Cache Playwright 和 Install Playwright 步骤已被安全删除
      # =============================================================

      - name: Run slot checker
        env:
          TARGET_URL: ${{ secrets.TARGET_URL }}
          SLOT_CATEGORY: ${{ inputs.slot_category || github.event.client_payload.slot_category || '普通車ＡＭ,普通車ＰＭ' }}
          ALERT_BEFORE: ${{ inputs.alert_before || github.event.client_payload.alert_before || '' }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: npm run check     # 此时环境中已自带 Chromium，能直接秒开运行

      - name: Commit state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ ! -f data/state.json ]; then
            echo "No state file — skipping commit"
            exit 0
          fi
          git add data/state.json
          if git diff --cached --quiet; then
            echo "No state change — skipping commit"
          else
            git commit -m "chore(ci): update state [skip ci]"   # D-14
            git push
          fi
