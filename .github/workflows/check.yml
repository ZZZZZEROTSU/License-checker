name: kawasaki-slot-checker

on:
  schedule:
    - cron: '0 * * * *'   # hourly, UTC (D-11)
  workflow_dispatch:        # manual trigger for testing
    inputs:
      slot_category:
        description: 'Slot category to check (e.g. 普通車ＡＭ)'
        required: false
        default: '普通車ＡＭ'
      alert_before:
        description: 'Only alert for slots before this date (YYYYMMDD)'
        required: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # needed to push state commit back

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'   # D-17
          cache: 'npm'         # caches node_modules across runs

      - name: Install dependencies
        run: npm ci            # D-16

      - name: Cache Playwright Chromium
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps   # D-13

      - name: Install Playwright system deps only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run slot checker
        env:
          TARGET_URL: ${{ secrets.TARGET_URL }}
          SLOT_CATEGORY: ${{ inputs.slot_category || '普通車ＡＭ' }}
          ALERT_BEFORE: ${{ inputs.alert_before || '' }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: npm run check     # D-16; CHROME_PATH intentionally absent → empty default → no executablePath

      - name: Commit state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ ! -f data/state.json ]; then
            echo "No state file — skipping commit"
            exit 0
          fi
          git add data/state.json
          if git diff --cached --quiet; then
            echo "No state change — skipping commit"
          else
            git commit -m "chore(ci): update state [skip ci]"   # D-14
            git push
          fi
